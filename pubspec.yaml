name: badgeup_mobile
description: Aplicacion de coleccion de stickers de carros con validacion GPS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
